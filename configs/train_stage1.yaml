stage_name: stage1-monophonic-foundation
epochs: 15
effective_samples_per_epoch: 114000
batch_size: 32
max_sequence_length: 256
lr_dora: 0.003
lr_new_modules: 0.001
warmup_steps: 2000
schedule: cosine
label_smoothing: 0.05
contour_loss_weight: 0.01
checkpoint_every_steps: 1000
validate_every_steps: 500
dataset_mix:
  - dataset: primus
    ratio: 0.70
    split: train
    required: true
  - dataset: cameraprimus
    ratio: 0.30
    split: train
    required: true

