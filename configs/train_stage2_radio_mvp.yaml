# MVP Stage 2 config using C-RADIOv4-H (~700M) encoder.
#
# Encoder selection: stage_b_encoder is read by load_stage_config() and
# threaded into ModelFactoryConfig.stage_b_encoder, which dispatches to
# build_radio_stage_b() in build_stage_b_components().
#
# Memory budget:
#   batch_size: 2 + grad_accumulation_steps: 8  =>  effective batch ~16
#   RADIO patch-16 grid at 250x2500 => ~12x156 = 1872 spatial tokens
#   (vs DaViT stride-32 ~6x78 = 468 tokens) -- 4x more cross-attn memory
#
# DoRA targets (enumerated empirically via scripts/enumerate_radio_modules.py):
#
#   RADIO ViT encoder (C-RADIOv4-H, 32 blocks, 128 attention/MLP linears):
#     - qkv   : combined Q/K/V projection  (attn.qkv,  32x)
#     - proj  : attention output projection (attn.proj, 32x)
#     - fc1   : MLP first layer             (mlp.fc1,   32x)
#     - fc2   : MLP second layer            (mlp.fc2,   32x)
#
#   Shared decoder block (same leaf names as DaViT path):
#     - q_proj, k_proj, v_proj, out_proj  (self-attention)
#     - cross_attn_q, cross_attn_k, cross_attn_v, cross_attn_out
#     - gate_proj, up_proj, down_proj     (FFN / SwiGLU)
#
# The target list lives in model_factory.list_radio_dora_target_modules().
# _prepare_model_for_dora matches via name.endswith(target) so leaf names
# are sufficient -- no regex needed.  Patch-embedding and head linears are
# intentionally excluded.
#
# Run command:
#   venv\Scripts\python src\train\train.py \
#       --stage-configs configs/train_stage2_radio_mvp.yaml \
#       --mode execute \
#       --checkpoint-dir checkpoints/mvp_radio_stage2

stage_name: stage2-radio-mvp
stage_b_encoder: radio_h

epochs: 3
effective_samples_per_epoch: 800
batch_size: 2
grad_accumulation_steps: 8
max_sequence_length: 384

lr_dora: 0.0005
lr_new_modules: 0.0003
loraplus_lr_ratio: 2.0
warmup_steps: 200
schedule: cosine
weight_decay: 0.01

label_smoothing: 0.05
contour_loss_weight: 0.01

checkpoint_every_steps: 200
validate_every_steps: 100

dataset_mix:
  - dataset: grandstaff
    ratio: 0.80
    split: train
    required: true
  - dataset: primus
    ratio: 0.10
    split: train
    required: true
  - dataset: cameraprimus
    ratio: 0.10
    split: train
    required: true
