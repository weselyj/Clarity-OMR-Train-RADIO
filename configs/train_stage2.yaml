stage_name: stage2-polyphonic
epochs: 30
effective_samples_per_epoch: 92000
batch_size: 8
grad_accumulation_steps: 2
max_sequence_length: 384
lr_dora: 0.001
lr_new_modules: 0.0005
loraplus_lr_ratio: 2.0
warmup_steps: 2000
schedule: cosine
label_smoothing: 0.05
contour_loss_weight: 0.01
checkpoint_every_steps: 1000
validate_every_steps: 500
dataset_mix:
  - dataset: grandstaff
    ratio: 0.80
    split: train
    required: true
  - dataset: primus
    ratio: 0.10
    split: train
    required: true
  - dataset: cameraprimus
    ratio: 0.10
    split: train
    required: true
