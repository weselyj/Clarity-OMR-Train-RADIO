stage_name: stage2-polyphonic-refine2-r64
epochs: 8
effective_samples_per_epoch: 18000
batch_size: 8
grad_accumulation_steps: 4
max_sequence_length: 512
lr_dora: 0.000025
lr_new_modules: 0.000012
loraplus_lr_ratio: 2.0
warmup_steps: 100
schedule: cosine
label_smoothing: 0.04
contour_loss_weight: 0.01
weight_decay: 0.01
checkpoint_every_steps: 500
validate_every_steps: 250
dataset_mix:
  - dataset: grandstaff
    ratio: 0.30
    split: train
    required: true
  - dataset: primus
    ratio: 0.20
    split: train
    required: true
  - dataset: cameraprimus
    ratio: 0.10
    split: train
    required: true
  - dataset: synthetic_polyphonic
    ratio: 0.15
    split: train
    required: true
  - dataset: focus_refine2_r64
    ratio: 0.15
    split: train
    required: true
  - dataset: synthetic_fullpage
    ratio: 0.05
    split: train
    required: true
  - dataset: lieder-main
    ratio: 0.05
    split: train
    required: false
